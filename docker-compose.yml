services:
  mongodb:
    image: mongo:6.0.5
    container_name: drivemind-telemetry-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  neo4j:
    image: neo4j:5
    container_name: drivemind-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/drivemind123
    volumes:
      - neo4j_data:/data

  ai-service:
    build: ./ai-service
    container_name: drivemind-ai-service
    ports:
      - "8000:8000"
    volumes:
      - ai_model_data:/app/models
      - ai_data:/app/data

  backend:
    build: ./backend
    container_name: drivemind-backend
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/drivemind
      - AI_SERVICE_URL=http://ai-service:8000
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=drivemind123
    depends_on:
      - mongodb
      - neo4j
      - ai-service

  frontend:
    build: ./frontend
    container_name: drivemind-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongodb_data:
  neo4j_data:
  ai_model_data:
  ai_data: